# ==================== 基础配置 ====================
server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: chunk-translate

  # ==================== 数据库配置 ====================
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/chunk_translate?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:xxx}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== Flyway 配置 ====================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false
    encoding: UTF-8
    table: flyway_schema_history

  # ==================== Redis 配置 ====================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 120MB

  # ==================== 邮件配置 ====================
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:xxx@example.com}
    password: ${MAIL_PASSWORD:xxx}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ==================== Spring Security OAuth2 Client ====================
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope:
              - read:user
              - user:email

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.chunktranslate.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== 文件存储配置 ====================
storage:
  type: local
  local:
    base-path: ./uploads

# ==================== 翻译线程池配置 ====================
translation:
  thread-pool:
    core-size: 10
    max-size: 20
    queue-capacity: 100
    keep-alive-seconds: 60

# ==================== 日志配置 ====================
logging:
  level:
    com.example.chunktranslate: DEBUG
    org.springframework.web: INFO

# ==================== SpringDoc OpenAPI 配置 ====================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
  packages-to-scan: com.example.chunktranslate.controller

# ==================== 阿里云机器翻译配置 ====================
aliyun:
  translation:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    endpoint: ${ALIYUN_ENDPOINT:mt.cn-hangzhou.aliyuncs.com}
    scene: general
    format-type: text

# ==================== DeepSeek AI 润色配置 ====================
deepseek:
  api:
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
    key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    max-tokens: 16384
    temperature: 0.3

# ==================== JWT 配置 ====================
jwt:
  secret: ${JWT_SECRET:chunk-translate-jwt-secret-key-2026-minimum-32-chars}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# ==================== 前端地址 ====================
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:5173}