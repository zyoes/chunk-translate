# ==================== 基础配置 ====================
server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: chunk-translate

  # ==================== 数据库配置 ====================
  datasource:
    url: jdbc:mysql://localhost:3306/chunk_translate?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: xxx
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ==================== Flyway 配置 ====================
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false
    encoding: UTF-8
    table: flyway_schema_history

  # ==================== Redis 配置 ====================
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms

  # ==================== 文件上传配置 ====================
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 120MB

  # ==================== Spring Security OAuth2 Client ====================
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope:
              - read:user
              - user:email

# ==================== MyBatis-Plus 配置 ====================
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.chunktranslate.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ==================== 文件存储配置 ====================
storage:
  type: local
  local:
    base-path: ./uploads

# ==================== 翻译线程池配置 ====================
translation:
  thread-pool:
    core-size: 10
    max-size: 20
    queue-capacity: 100
    keep-alive-seconds: 60

# ==================== 日志配置 ====================
logging:
  level:
    com.example.chunktranslate: DEBUG
    org.springframework.web: INFO

# ==================== SpringDoc OpenAPI 配置 ====================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
  packages-to-scan: com.example.chunktranslate.controller

# ==================== 阿里云机器翻译配置 ====================
aliyun:
  translation:
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    endpoint: mt.cn-hangzhou.aliyuncs.com
    scene: general
    format-type: text

# ==================== DeepSeek AI 润色配置 ====================
deepseek:
  api:
    url: https://api.deepseek.com/v1/chat/completions
    key: your-deepseek-api-key
    model: deepseek-chat
    max-tokens: 16384
    temperature: 0.3

# ==================== JWT 配置 ====================
jwt:
  secret: "chunk-translate-jwt-secret-key-2026-min-32-chars"
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

# ==================== 前端地址 ====================
app:
  frontend-url: "http://localhost:5173"